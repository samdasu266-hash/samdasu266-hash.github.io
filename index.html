<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건직 및 간호사 공기업/공단 채용공고 모음집</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2720320967054456" crossorigin="anonymous"></script>
    <meta name="google-adsense-account" content="ca-pub-2720320967054456">
    <meta name="description" content="전국 보건의료 공공기관의 최신 채용 정보를 매시간 정각 업데이트하여 제공합니다.">
    <link rel="canonical" href="https://samdasu266-hash.github.io/">

    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: #f8fafc; color: #1e293b; line-height: 1.6; letter-spacing: -0.02em;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .filter-scroll-container { scrollbar-width: thin; scrollbar-color: #cbd5e1 transparent; }
        .filter-scroll-container::-webkit-scrollbar { height: 4px; }
        .filter-scroll-container::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        .job-card { transition: all 0.2s ease-in-out; }
        .job-card:hover { transform: translateY(-2px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
    </style>
</head>
<body class="bg-slate-50">

    <div style="display:none;">
        <h1>보건의료 공기업 채용 정보 대시보드</h1>
        <p>국민건강보험공단, 건강보험심사평가원 등 주요 보건의료 기관의 실시간 채용 정보를 제공합니다.</p>
    </div>

    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDUBJ3oGSEbhEKHLP04OuUUXkiZNpv6vXE",
            authDomain: "get-out-from-hospital.firebaseapp.com",
            projectId: "get-out-from-hospital",
            storageBucket: "get-out-from-hospital.firebasestorage.app",
            messagingSenderId: "18005175262",
            appId: "1:18005175262:web:ae31eedd60bb90d438cb4f"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.app().firestore('default');
        const auth = firebase.auth();
        const APP_ID = "recruitment-portal-v3";

        const App = () => {
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('all');
            const [lastSync, setLastSync] = useState(null);
            const [showSpecInfo, setShowSpecInfo] = useState(null);
            const scrollContainerRef = useRef(null);

            const institutions = [
                { id: 'nhis', name: '국민건강보험공단', shortName: '건보공단', url: 'https://nhis.kpcice.kr', specs: { language: '토익 700↑', cert: '컴활 1급, 한국사 1급', license: '보건/의료 면허', salary: '신입 약 4,000 / 평균 약 7,500', parentalLeave: '최대 3년 보장', summary: '서류 가점이 합격을 결정합니다.' } },
                { id: 'hira', name: '건강보험심사평가원', shortName: '심평원', url: 'https://hira.recruitlab.co.kr', specs: { language: '토익 700↑', cert: '컴활 1급, 한국사 1급', license: '간호사 등 면허 필수', salary: '신입 약 4,100 / 평균 약 7,800', parentalLeave: '최대 3년 보장', summary: '심사직은 임상경력이 필수입니다.' } },
                { id: 'nps', name: '국민연금공단', shortName: '국민연금', url: 'https://nps.saramin.co.kr', specs: { language: '700↑ 권장', cert: '컴활 1급, 한국사 1급', license: '전공 우대', salary: '신입 약 3,800 / 평균 약 7,100', parentalLeave: '3년 보장', summary: '필기 난이도가 상당히 높습니다.' } },
                { id: 'comwel', name: '근로복지공단', shortName: '근로복지', url: 'https://www.comwel.or.kr/recruit', specs: { language: '어학 가점제', cert: '컴활, 한국사, 사복 1급', license: '간호사 면허 우대', salary: '신입 약 3,600 / 평균 약 6,500', parentalLeave: '최대 3년', summary: '필기 비중이 매우 높습니다.' } },
                { id: 'neca', name: '한국보건의료연구원', shortName: '보의연', url: 'https://www.neca.re.kr', specs: { language: '800↑ 우대', cert: '데이터 자격 우대', license: '석사 권장', salary: '신입 약 3,900 / 평균 약 7,200', parentalLeave: '법정 1년+', summary: '연구 전문 역량을 중시합니다.' } },
                { id: 'kuksiwon', name: '한국보건의료인국가시험원', shortName: '국시원', url: 'https://dware.intojob.co.kr', specs: { language: '750↑ 권장', cert: '정처기 가점', license: '행정직 무관', salary: '신입 약 3,700 / 평균 약 6,900', parentalLeave: '기본 1년', summary: '행정 처리 역량이 중요합니다.' } },
                { id: 'koiha', name: '의료기관평가인증원', shortName: '인증원', url: 'https://koiha.recruiter.co.kr', specs: { language: '영어 필수', cert: '보건교육사 우대', license: '의료인 우대', salary: '신입 약 3,800 / 평균 약 6,800', parentalLeave: '기본 1년', summary: '인증 실무 경험자를 선호합니다.' } },
                { id: 'redcross', name: '대한적십자사', shortName: '적십자사', url: 'https://www.redcross.or.kr/recruit/', specs: { language: '700↑ 사무직', cert: '봉사, 헌혈 가점', license: '간호/병리 면허', salary: '신입 약 3,500 / 평균 약 6,200', parentalLeave: '최대 3년', summary: '봉사 정신이 핵심 평가 요소입니다.' } },
                { id: 'mohw', name: '보건복지부', shortName: '보건복지부', url: 'https://www.mohw.go.kr', specs: { language: '공고별 상이', cert: '직무 자격증', license: '의료인 우대', salary: '규정 준수', parentalLeave: '법정 보장', summary: '공무직 채용이 수시로 진행됩니다.' } },
            ];

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    const dataRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                    dataRef.collection('jobs').onSnapshot(snap => {
                        const list = [];
                        const seenTitles = new Set(); 
                        snap.forEach(doc => {
                            const data = doc.data();
                            const compareTitle = (data.title || '').replace(/\s+/g, '');
                            if (!seenTitles.has(compareTitle)) {
                                seenTitles.add(compareTitle);
                                list.push({ id: doc.id, ...data });
                            }
                        });
                        list.sort((a, b) => new Date(b.postedDate || 0) - new Date(a.postedDate || 0));
                        setJobs(list);
                        setLoading(false);
                    });
                    dataRef.collection('metadata').doc('sync').onSnapshot(doc => {
                        if(doc.exists && doc.data().lastSync) setLastSync(new Date(doc.data().lastSync));
                    });
                });
            }, []);

            const filteredJobs = useMemo(() => {
                return jobs.filter(job => 
                    (job.title?.toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (activeTab === 'all' || job.instId === activeTab)
                );
            }, [jobs, searchTerm, activeTab]);

            const formatDate = (d) => d ? `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일` : '확인 중...';
            const formatTime = (d) => d ? `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}` : '';

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8">
                    <header className="mb-10 space-y-3 text-left">
                        <div className="flex flex-wrap gap-2">
                            <span className="bg-blue-600 text-white px-2.5 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider">매시간 정각 자동 업데이트</span>
                            <span className="bg-white border border-slate-200 text-slate-600 px-2.5 py-0.5 rounded-full text-[10px] font-bold flex items-center gap-1 shadow-sm">
                                <Icon name="calendar" className="w-3 h-3 text-blue-500" /> 기준일자: {formatDate(lastSync)}
                            </span>
                            <span className="bg-white border border-slate-200 text-slate-500 px-2.5 py-0.5 rounded-full text-[10px] font-bold flex items-center gap-1">
                                <Icon name="clock" className="w-3 h-3" /> 최근 수집: {formatTime(lastSync)}
                            </span>
                        </div>
                        <h1 className="text-2xl md:text-3xl font-black text-slate-900 leading-tight">
                            보건직 및 간호사 <span className="text-blue-600">공기업/공단 채용공고</span> 모음집
                        </h1>
                    </header>

                    <div className="grid grid-cols-1 lg:grid-cols-4 gap-6">
                        <aside className="lg:col-span-1 space-y-4">
                            <div className="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm text-left">
                                <h2 className="text-[11px] font-black text-slate-400 uppercase mb-5 tracking-widest font-bold">수집 기관</h2>
                                <nav className="space-y-4 font-medium text-slate-600">
                                    {institutions.map(inst => (
                                        <div key={inst.id} className="pb-3 border-b border-slate-50 last:border-0 last:pb-0">
                                            <div className="flex items-center justify-between text-[13px] font-bold text-slate-700">
                                                {inst.name}
                                                <button onClick={() => window.open(inst.url, '_blank')} className="text-slate-300 hover:text-blue-600 transition-colors"><Icon name="external-link" className="w-3.5 h-3.5" /></button>
                                            </div>
                                            <button onClick={() => setShowSpecInfo(inst)} className="text-[10px] text-blue-600 font-bold hover:underline mt-1.5 flex items-center gap-1"><Icon name="award" className="w-3 h-3" /> 상세 정보 보기</button>
                                        </div>
                                    ))}
                                </nav>
                            </div>
                        </aside>

                        <main className="lg:col-span-3 space-y-5 text-left">
                            <div className="bg-white p-4 rounded-2xl border border-slate-200 space-y-4 shadow-sm">
                                <div className="relative">
                                    <Icon name="search" className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-300 w-4 h-4" />
                                    <input type="text" placeholder="공고 제목으로 검색..." onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-2.5 bg-slate-50 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium border-none" />
                                </div>
                                <div className="filter-scroll-container flex gap-1.5 overflow-x-auto pb-1 px-1 no-scrollbar">
                                    <button onClick={() => setActiveTab('all')} className={`flex-shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold border transition-all ${activeTab === 'all' ? 'bg-slate-900 text-white border-slate-900 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>전체보기</button>
                                    {institutions.map(inst => (
                                        <button key={inst.id} onClick={() => setActiveTab(inst.id)} className={`flex-shrink-0 px-4 py-1.5 rounded-lg text-xs font-bold border transition-all ${activeTab === inst.id ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>{inst.shortName}</button>
                                    ))}
                                </div>
                            </div>

                            <div className="space-y-3">
                                {loading ? (
                                    <div className="py-20 text-center text-slate-300 animate-pulse font-bold text-sm">데이터 로딩 중...</div>
                                ) : filteredJobs.length > 0 ? (
                                    filteredJobs.map(job => {
                                        const isClosed = job.status === "마감";
                                        return (
                                            <div key={job.id} className="job-card bg-white p-5 md:p-6 rounded-2xl border border-slate-200 hover:shadow-lg transition-all flex flex-col md:flex-row justify-between items-start md:items-center gap-4 text-left group">
                                                <div className="space-y-2.5 flex-1">
                                                    <div className="flex gap-2 items-center">
                                                        <span className="text-[10px] font-black px-1.5 py-0.5 bg-slate-100 rounded text-slate-500 uppercase">{institutions.find(i => i.id === job.instId)?.shortName || job.instId}</span>
                                                        {/* 🔥 동적 상태 배지 */}
                                                        <span className={`text-[10px] font-bold px-1.5 rounded ${isClosed ? 'text-red-600 bg-red-50' : 'text-blue-600 bg-blue-50'}`}>
                                                            {isClosed ? '서류접수마감' : '채용진행중'}
                                                        </span>
                                                    </div>
                                                    <h3 className={`text-[16px] md:text-[18px] font-bold leading-snug break-keep ${isClosed ? 'text-slate-400' : 'text-slate-800 group-hover:text-blue-700'} transition-colors`}>{job.title}</h3>
                                                    <div className="flex gap-4 text-[11px] font-bold text-slate-400">
                                                        <span className="flex items-center gap-1"><Icon name="calendar" className="w-3 h-3" /> 게시일: {job.postedDate}</span>
                                                        <span className={`flex items-center gap-1 font-medium ${isClosed ? 'text-slate-300' : 'text-red-400'}`}><Icon name="clock" className="w-3 h-3" /> {job.endDate || '상세참조'}</span>
                                                    </div>
                                                </div>
                                                <button onClick={() => window.open(job.link, '_blank')} className={`w-full md:w-auto px-7 py-3 rounded-xl font-bold text-xs transition-colors shrink-0 shadow-sm ${isClosed ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-900 text-white hover:bg-blue-600'}`}>
                                                    {isClosed ? '모집종료' : '지원하기'}
                                                </button>
                                            </div>
                                        );
                                    })
                                ) : (
                                    <div className="py-20 text-center bg-white rounded-2xl border border-dashed border-slate-300">
                                        <p className="text-slate-400 text-sm font-bold font-medium">현재 필터에 맞는 공고가 없습니다.</p>
                                    </div>
                                )}
                            </div>
                        </main>
                    </div>

                    {showSpecInfo && (
                        <div className="fixed inset-0 z-[9999] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white w-full max-w-md rounded-[2rem] p-7 shadow-2xl relative text-left animate-in zoom-in duration-300 max-h-[90vh] overflow-y-auto no-scrollbar">
                                <button onClick={() => setShowSpecInfo(null)} className="absolute top-6 right-6 text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" /></button>
                                <div className="space-y-5">
                                    <h2 className="text-xl font-black text-slate-900">{showSpecInfo.name} 상세 정보</h2>
                                    <div className="space-y-4">
                                        <div className="grid grid-cols-1 gap-3">
                                            <div className="p-3.5 bg-blue-50 border border-blue-100 rounded-xl">
                                                <p className="text-[10px] font-black text-blue-500 mb-0.5 uppercase tracking-widest font-bold">연봉 정보</p>
                                                <p className="text-sm font-bold text-slate-800 font-bold">{showSpecInfo.specs.salary}</p>
                                            </div>
                                            <div className="p-3.5 bg-purple-50 border border-purple-100 rounded-xl">
                                                <p className="text-[10px] font-black text-purple-500 mb-0.5 uppercase tracking-widest font-bold">복지 및 육아</p>
                                                <p className="text-sm font-bold text-slate-800 font-bold leading-relaxed">{showSpecInfo.specs.parentalLeave}</p>
                                            </div>
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-2xl border-l-4 border-blue-400">
                                            <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">기관 요약</p>
                                            <p className="text-sm font-bold text-slate-700 leading-relaxed font-bold">{showSpecInfo.specs.summary}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowSpecInfo(null)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-colors shadow-lg">닫기</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
