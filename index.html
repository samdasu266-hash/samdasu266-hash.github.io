<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건직 및 간호사 공기업/공단 채용공고 모음집</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 text-left">
    <div id="root"></div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className}></i>;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDUBJ3oGSEbhEKHLP04OuUUXkiZNpv6vXE",
            authDomain: "get-out-from-hospital.firebaseapp.com",
            projectId: "get-out-from-hospital",
            storageBucket: "get-out-from-hospital.firebasestorage.app",
            messagingSenderId: "18005175262",
            appId: "1:18005175262:web:ae31eedd60bb90d438cb4f",
            measurementId: "G-2Y8EY9552N"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const APP_ID = "recruitment-portal-v3";

        const App = () => {
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('all');
            const [lastSync, setLastSync] = useState("");
            const [showSpecInfo, setShowSpecInfo] = useState(null);

            // 1. 합격 스펙 정확성 재확인 및 업데이트 (NHIS url 변경)
            const institutions = [
                { id: 'nhis', name: '국민건강보험공단', shortName: '건보공단', url: 'https://www.nhis.or.kr/nhis/together/wbhaea02700m01.do', specs: { language: '토익 700점 이상', cert: '컴활 1급, 한국사 1급, 사복 1급', license: '간호사/영양사/방사선사 등', summary: 'NCS(필기) 변별력이 가장 크며, 서류 자격증 가점이 필수적입니다.' } },
                { id: 'hira', name: '건강보험심사평가원', shortName: '심평원', url: 'https://hira.recruitlab.co.kr/app/recruitment-announcement/list', specs: { language: '토익 700점 이상 (사무/심사직)', cert: '컴활 1급, 한국사 1급', license: '간호사 등 면허 및 임상경력', summary: '심사직은 임상경력이 중요하며, 사무직은 서류 가점(자격증)이 합격의 열쇠입니다.' } },
                { id: 'neca', name: '한국보건의료연구원', shortName: '보의연', url: 'https://neca.applyin.co.kr/jobs/', specs: { language: '토익 800점 이상 우대', cert: '데이터 분석(ADsP, 사회조사분석사)', license: '석/박사 학위 (연구직 중심)', summary: '연구직 비중이 높아 관련 전공 석사 이상 학위와 연구 실적이 중시됩니다.' } },
                { id: 'kuksiwon', name: '한국보건의료인국가시험원', shortName: '국시원', url: 'https://dware.intojob.co.kr', specs: { language: '토익 700점 이상', cert: '컴활 1급, 정보처리기사 등', license: '직렬별 무관 (행정 중심)', summary: '국가시험을 주관하는 기관으로, 꼼꼼한 행정 및 기획 역량이 요구됩니다.' } },
                { id: 'koiha', name: '의료기관평가인증원', shortName: '인증원', url: 'https://koiha.recruiter.co.kr', specs: { language: '공인영어성적 필수', cert: '보건교육사, 의무기록사 우대', license: '의료인 면허 및 임상경력', summary: '의료기관 평가 인증 업무를 수행하므로 관련 실무 경력자를 강하게 선호합니다.' } },
            ];

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    const dataRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                    
                    // 4. 공고 제목 괄호 날짜 지우기 함수
                    const cleanTitleText = (title) => {
                        if (!title) return '';
                        // 날짜 패턴(2024.01.01~02.01 등) 찾아서 제거
                        let cleaned = title.replace(/[\[\(]?\d{2,4}[-./]\d{1,2}[-./]\d{1,2}\s*[~-]\s*(\d{2,4}[-./])?\d{1,2}[-./]\d{1,2}[\]\)]?/g, '');
                        // 빈 괄호 찌꺼기 제거
                        cleaned = cleaned.replace(/\(\s*\)|\[\s*\]/g, '');
                        return cleaned.trim();
                    };

                    const unsubscribeJobs = dataRef.collection('jobs').onSnapshot(snap => {
                        const list = [];
                        snap.forEach(doc => {
                            const data = doc.data();
                            const titleLower = (data.title || '').toLowerCase();
                            
                            // 3. 첨부파일 끌고 오지 않기 (필터링)
                            const isAttachment = /\.(hwp|hwpx|pdf|zip|doc|docx|xls|xlsx)/i.test(titleLower);
                            const hasAttachKeyword = /첨부|붙임|다운로드|파일/.test(titleLower);
                            
                            // 첨부파일이 아닐 때만 리스트에 넣음
                            if (!isAttachment && !hasAttachKeyword) {
                                data.displayTitle = cleanTitleText(data.title);
                                list.push({ id: doc.id, ...data });
                            }
                        });
                        
                        list.sort((a, b) => new Date(b.postedDate || 0) - new Date(a.postedDate || 0));
                        setJobs(list);
                        setLoading(false);
                        setError(null);
                    }, err => {
                        setError(`데이터 수집 실패: ${err.message}`);
                        setLoading(false);
                    });
                    
                    const unsubscribeSync = dataRef.collection('metadata').doc('sync').onSnapshot(doc => {
                        if(doc.exists && doc.data().lastSync) setLastSync(new Date(doc.data().lastSync).toLocaleString());
                    });
                    
                    return () => { unsubscribeJobs(); unsubscribeSync(); };
                }).catch(err => setError(`인증 에러: ${err.message}`));
            }, []);

            const filteredJobs = useMemo(() => {
                return jobs.filter(job => 
                    // 필터 시에도 클리닝된 제목 기준
                    (job.displayTitle?.toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (activeTab === 'all' || job.instId === activeTab)
                );
            }, [jobs, searchTerm, activeTab]);

            return (
                <div className="min-h-screen bg-slate-50 p-4 md:p-8 text-left">
                    <div className="max-w-6xl mx-auto">
                        <header className="mb-10 space-y-4">
                            <div className="flex gap-2">
                                <span className="bg-blue-600 text-white px-3 py-1 rounded-full text-[10px] font-bold uppercase tracking-tighter">Live Updates</span>
                                <span className="bg-white border border-slate-200 text-slate-500 px-3 py-1 rounded-full text-[10px] font-bold">수집 시각: {lastSync || '확인 중...'}</span>
                            </div>
                            <h1 className="text-3xl md:text-4xl font-black text-slate-900 leading-tight">
                                보건직 및 간호사<br/>
                                <span className="text-blue-600">공기업/공단 채용공고</span> 모음집
                            </h1>
                        </header>

                        <div className="grid grid-cols-1 lg:grid-cols-4 gap-8">
                            <aside className="lg:col-span-1 space-y-6">
                                <div className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
                                    <h2 className="text-xs font-black text-slate-400 uppercase mb-6 tracking-widest text-left">수집 대상 기관</h2>
                                    <nav className="space-y-6">
                                        {institutions.map(inst => (
                                            <div key={inst.id} className="space-y-2">
                                                <div className="flex items-center justify-between text-sm font-bold text-slate-700">
                                                    {inst.name}
                                                    <button onClick={() => window.open(inst.url, '_blank')} className="text-slate-300 hover:text-blue-600 transition-colors">
                                                        <Icon name="external-link" className="w-3 h-3" />
                                                    </button>
                                                </div>
                                                <div className="p-3 bg-slate-50 rounded-xl text-left">
                                                    <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-tighter">합격 전략</p>
                                                    <p className="text-[11px] text-slate-600 leading-relaxed font-medium">{inst.specs.summary}</p>
                                                    <button onClick={() => setShowSpecInfo(inst)} className="text-[10px] text-blue-600 font-bold mt-2 hover:underline block">상세 정보</button>
                                                </div>
                                            </div>
                                        ))}
                                    </nav>
                                </div>
                            </aside>

                            <main className="lg:col-span-3 space-y-6">
                                {error && <div className="bg-red-50 border border-red-200 p-4 rounded-2xl mb-6 text-red-600 text-sm font-bold text-left">⚠️ {error}</div>}
                                
                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 space-y-6">
                                    <div className="relative">
                                        <Icon name="search" className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-300" />
                                        <input type="text" placeholder="공고 제목으로 검색..." onChange={e => setSearchTerm(e.target.value)} className="w-full pl-12 pr-6 py-3.5 bg-slate-50 rounded-2xl text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium" />
                                    </div>
                                    <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                        <button onClick={() => setActiveTab('all')} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${activeTab === 'all' ? 'bg-slate-900 text-white' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}>전체보기</button>
                                        {institutions.map(inst => (
                                            <button key={inst.id} onClick={() => setActiveTab(inst.id)} className={`px-5 py-2 rounded-xl text-xs font-bold whitespace-nowrap transition-all ${activeTab === inst.id ? 'bg-blue-600 text-white shadow-lg' : 'bg-white border border-slate-200 text-slate-500 hover:bg-slate-100'}`}>{inst.shortName}</button>
                                        ))}
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    {loading ? (
                                        <div className="py-24 text-center font-bold text-slate-300 animate-pulse text-lg tracking-tight">정보를 로드 중입니다...</div>
                                    ) : filteredJobs.length > 0 ? (
                                        filteredJobs.map(job => {
                                            const inst = institutions.find(i => i.id === job.instId) || { shortName: job.instId };
                                            // 2. 접수기간 텍스트 포맷 처리
                                            const periodText = job.endDate && !job.endDate.includes('상세') 
                                                                ? `${job.postedDate} ~ ${job.endDate}` 
                                                                : `${job.postedDate} ~ 별도확인`;

                                            return (
                                                <div key={job.id} className="bg-white p-6 md:p-8 rounded-3xl border border-slate-200 hover:border-blue-400 hover:shadow-xl transition-all flex flex-col md:flex-row justify-between items-start md:items-center gap-6 group text-left">
                                                    <div className="space-y-3 flex-1">
                                                        <div className="flex gap-2">
                                                            <span className="text-[10px] font-black px-2 py-0.5 bg-slate-100 rounded text-slate-500 uppercase">{inst.shortName}</span>
                                                            <span className="text-[10px] font-bold text-blue-600 bg-blue-50 px-2 rounded uppercase">채용공고</span>
                                                        </div>
                                                        {/* 4. 클리닝 된 제목(displayTitle) 출력 */}
                                                        <h3 className="text-xl font-bold text-slate-800 leading-snug group-hover:text-blue-700 transition-colors">{job.displayTitle}</h3>
                                                        <div className="flex gap-4 text-xs font-bold text-slate-400 tracking-tight">
                                                            {/* 2. 접수기간 렌더링 */}
                                                            <span className="flex items-center gap-1">
                                                                <Icon name="calendar" className="w-3 h-3" />
                                                                접수기간: {periodText}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <button onClick={() => window.open(job.link, '_blank')} className="w-full md:w-auto px-10 py-4 bg-slate-900 text-white rounded-2xl font-bold text-sm hover:bg-blue-600 transition-colors shadow-lg shadow-slate-200">지원하기</button>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="py-24 text-center bg-white rounded-3xl border border-dashed border-slate-300 font-pretendard text-center">
                                            <Icon name="file-text" className="w-12 h-12 text-slate-200 mx-auto mb-4" />
                                            <p className="text-slate-500 text-sm font-medium tracking-tight">등록된 채용 공고가 없습니다.</p>
                                        </div>
                                    )}
                                </div>
                            </main>
                        </div>
                    </div>

                    {showSpecInfo && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm transition-all">
                            <div className="bg-white w-full max-w-md rounded-[2.5rem] p-8 shadow-2xl relative text-left animate-in zoom-in duration-300">
                                <button onClick={() => setShowSpecInfo(null)} className="absolute top-8 right-8 text-slate-300 hover:text-slate-900 transition-colors"><Icon name="x" /></button>
                                <div className="space-y-6">
                                    <h2 className="text-2xl font-black text-slate-900">{showSpecInfo.name} 상세 스펙</h2>
                                    <div className="space-y-4">
                                        <div className="p-4 bg-slate-50 rounded-2xl text-left">
                                            <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest text-left">어학 성적</p>
                                            <p className="text-sm font-bold text-slate-700 text-left">{showSpecInfo.specs.language}</p>
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-2xl text-left">
                                            <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest text-left">자격 사항</p>
                                            <p className="text-sm font-bold text-slate-700 text-left">{showSpecInfo.specs.cert}</p>
                                        </div>
                                        <div className="p-4 bg-slate-50 rounded-2xl text-left">
                                            <p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest text-left">면허/학위</p>
                                            <p className="text-sm font-bold text-slate-700 text-left">{showSpecInfo.specs.license}</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setShowSpecInfo(null)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold hover:bg-blue-600 transition-colors">확인 완료</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
