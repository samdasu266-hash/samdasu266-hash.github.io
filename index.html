<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>보건직 및 간호사 공기업/공단 채용공고 모음집</title>

    <!-- SEO 및 사이트 인증 -->
    <meta name="google-site-verification" content="YbtXKax0mEaSRYKSQ2FaKFeCbyO7ksx7ZAUrb7vOqxA" /> 
    <meta name="naver-site-verification" content="3e49b3f8572904833adf7cb4c4bb22f78335d8ec" />
    <meta name="google-adsense-account" content="ca-pub-2720320967054456">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-2720320967054456" crossorigin="anonymous"></script>

    <meta name="description" content="전국 보건의료 공공기관(국민건강보험공단, 건강보험심사평가원, 국민연금공단 등)의 최신 채용 정보를 실시간으로 모아 제공합니다.">
    <link rel="canonical" href="https://samdasu266-hash.github.io/">

    <!-- 라이브러리 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap');
        body { 
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif; 
            background-color: #f8fafc; color: #1e293b; line-height: 1.6; letter-spacing: -0.02em;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .job-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .job-card:hover { transform: translateY(-2px); border-color: #3b82f6; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        
        /* 네비게이션 정렬 및 하단 라인 보정 */
        .nav-link { position: relative; display: inline-flex; align-items: center; height: 40px; padding-bottom: 2px; }
        .nav-link.active::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background-color: #2563eb; }
    </style>
</head>
<body class="bg-slate-50 text-left">

    <!-- 검색 엔진 로봇을 위한 텍스트 내용 -->
    <div id="root">
        <div style="display:none;">
            <h2>보건의료 공공기관 취업 포털 서비스 안내</h2>
            <p>이 사이트는 국민건강보험공단(건보), 건강보험심사평가원(심평원), 국민연금공단, 근로복지공단, 대한적십자사 등 보건의료 분야 주요 공공기관의 채용 공고를 실시간으로 모아 제공하는 전문 정보 플랫폼입니다.</p>
            <p>간호사, 방사선사, 물리치료사 및 보건행정직 취업 준비생들을 위해 각 기관별 초봉 연봉 정보, 서류 전형 필수 가점 자격증, 실제 현직자들이 말하는 육아휴직 및 유연근무 분위기를 상세히 분석하여 가이드로 제공하고 있습니다.</p>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Icon = ({ name, className = "w-5 h-5" }) => {
            useEffect(() => { if (window.lucide) lucide.createIcons(); }, [name, className]);
            return <i data-lucide={name} className={className}></i>;
        };

        const firebaseConfig = {
            apiKey: "AIzaSyDUBJ3oGSEbhEKHLP04OuUUXkiZNpv6vXE",
            authDomain: "get-out-from-hospital.firebaseapp.com",
            projectId: "get-out-from-hospital",
            storageBucket: "get-out-from-hospital.firebasestorage.app",
            messagingSenderId: "18005175262",
            appId: "1:18005175262:web:ae31eedd60bb90d438cb4f"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.app().firestore('default');
        const auth = firebase.auth();
        const APP_ID = "recruitment-portal-v3";

        const App = () => {
            const [jobs, setJobs] = useState([]);
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [activeTab, setActiveTab] = useState('all');
            const [lastSync, setLastSync] = useState(null);
            const [todayVisitors, setTodayVisitors] = useState(0);
            const [mainView, setMainView] = useState('jobs'); 
            const [showPrivacy, setShowPrivacy] = useState(false);
            const [showContact, setShowContact] = useState(false);

            // 🔥 기관 데이터 (한국어 줄임말 매핑용)
            const institutions = [
                { id: 'nhis', name: '국민건강보험공단', shortName: '건보공단', specs: { recruitSchedule: '연 2회 (3~4월, 8~9월)', salary: '신입 약 4,000 / 평균 약 7,500', language: '토익 850+', cert: '컴활 1급, 한국사 1급 필수 수준', summary: '서류 가점을 만점으로 채우는 것이 기본입니다.' } },
                { id: 'hira', name: '건강보험심사평가원', shortName: '심평원', specs: { recruitSchedule: '연 2회 (4~5월, 9~10월)', salary: '신입 약 4,100 / 평균 약 7,800', language: '토익 850+ (심사직 700+)', cert: 'ADsP, SQLD 등 데이터 자격증 우대', summary: '심사직은 종합병원급 임상경력이 핵심입니다.' } },
                { id: 'nps', name: '국민연금공단', shortName: '국민연금', specs: { recruitSchedule: '연 2회 (4월, 9월)', salary: '신입 약 3,800 / 평균 약 7,100', language: '토익 800+', cert: '사회복지사 1급 강력 우대', summary: '전공 필기 난이도가 매우 높습니다.' } },
                { id: 'comwel', name: '근로복지공단', shortName: '근로복지', specs: { recruitSchedule: '연 2회 (4~5월, 9~10월)', salary: '신입 약 3,600 / 평균 약 6,500', language: '토익 750+', cert: '직무 자격증 가점 비중 높음', summary: '필기 전형 비중이 압도적으로 높습니다.' } },
                { id: 'neca', name: '한국보건의료연구원', shortName: '보의연', specs: { recruitSchedule: '수시 및 통합채용', salary: '신입 약 3,900 / 평균 약 7,200', language: '토익 800+', cert: '연구 실적 중시', summary: '연구직 중심의 아카데믹한 분위기입니다.' } },
                { id: 'kuksiwon', name: '한국보건의료인국가시험원', shortName: '국시원', specs: { recruitSchedule: '연 1~2회 (하반기)', salary: '신입 약 3,700 / 평균 약 6,900', language: '토익 750+', cert: '행정 역량 중시', summary: '서울 소재 및 비수기 워라밸 최상입니다.' } },
                { id: 'koiha', name: '의료기관평가인증원', shortName: '인증원', specs: { recruitSchedule: '상·하반기 및 수시', salary: '신입 약 3,800 / 평균 약 6,800', language: '영어성적 필수', cert: '인증 평가 경력 우대', summary: '현장 평가 출장이 잦은 전문직무입니다.' } },
                { id: 'redcross', name: '대한적십자사', shortName: '적십자사', specs: { recruitSchedule: '본사 통합 및 지사별 수시', salary: '신입 약 3,500 / 평균 약 6,200', language: '토익 750+', cert: '헌혈 및 봉사 경력 중시', summary: '적십자 정신과 봉사 실적이 중요합니다.' } },
                { id: 'mohw', name: '보건복지부', shortName: '보건복지부', specs: { recruitSchedule: '수시 채용', salary: '공무직 보수규정 적용', language: '직무별 상이', cert: '관련 실무경력 중시', summary: '다양한 공무직 및 임기제 채용이 진행됩니다.' } }
            ];

            useEffect(() => {
                auth.signInAnonymously().then(() => {
                    const dataRef = db.collection('artifacts').doc(APP_ID).collection('public').doc('data');
                    dataRef.collection('jobs').onSnapshot(snap => {
                        const list = [];
                        snap.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                        list.sort((a, b) => new Date(b.startDate || b.postedDate || 0) - new Date(a.startDate || a.postedDate || 0));
                        setJobs(list);
                        setLoading(false);
                    });

                    dataRef.collection('metadata').doc('sync').onSnapshot(doc => {
                        if(doc.exists && doc.data().lastSync) setLastSync(new Date(doc.data().lastSync));
                    });

                    const now = new Date();
                    const kst = new Date(now.getTime() + (now.getTimezoneOffset() * 60000) + (9 * 3600000));
                    const todayKey = `${kst.getFullYear()}-${String(kst.getMonth() + 1).padStart(2, '0')}-${String(kst.getDate()).padStart(2, '0')}`; 
                    const visitorDocRef = dataRef.collection('visitors').doc(todayKey);
                    if (!localStorage.getItem(`visited_${todayKey}`)) {
                        visitorDocRef.set({ count: firebase.firestore.FieldValue.increment(1), date: todayKey }, { merge: true })
                        .then(() => localStorage.setItem(`visited_${todayKey}`, 'true')).catch(e => console.error(e));
                    }
                    visitorDocRef.onSnapshot(doc => setTodayVisitors(doc.exists ? doc.data().count || 0 : 1));
                });
            }, []);

            const filteredJobs = useMemo(() => {
                return jobs.filter(job => 
                    (job.title?.toLowerCase().includes(searchTerm.toLowerCase())) &&
                    (activeTab === 'all' || job.instId === activeTab)
                );
            }, [jobs, searchTerm, activeTab]);

            return (
                <div className="max-w-5xl mx-auto p-4 md:p-8 flex flex-col min-h-[100dvh]">
                    
                    {/* 상단 네비게이션 (정렬 보정) */}
                    <nav className="mb-10 flex flex-wrap items-center gap-x-6 gap-y-2 border-b border-slate-200 text-[13px] md:text-sm font-bold overflow-x-auto no-scrollbar whitespace-nowrap">
                        <button 
                            onClick={() => setMainView('jobs')} 
                            className={`nav-link transition-colors ${mainView === 'jobs' ? 'text-blue-600 active' : 'text-slate-500 hover:text-slate-800'}`}
                        >
                            실시간 공고
                        </button>
                        <a href="tips.html" className="nav-link text-slate-500 hover:text-blue-600">취업 총정리</a>
                        <a href="guide.html" className="nav-link text-slate-500 hover:text-blue-600">근무환경 비교</a>
                        <a href="career.html" className="nav-link text-slate-500 hover:text-blue-600">임상경력 활용</a>
                        <a href="license.html" className="nav-link text-slate-500 hover:text-blue-600">가점 자격증</a>
                        <a href="interview.html" className="nav-link text-slate-500 hover:text-blue-600">면접 주의사항</a>
                    </nav>

                    <header className="mb-10 space-y-3">
                        <div className="flex flex-wrap gap-2">
                            <span className="bg-blue-600 text-white px-2.5 py-0.5 rounded-full text-[10px] font-bold">LIVE UPDATE</span>
                            <span className="bg-white border border-slate-200 text-slate-700 px-2.5 py-0.5 rounded-full text-[10px] font-bold shadow-sm flex items-center gap-1">
                                <Icon name="users" className="w-3 h-3 text-emerald-500" /> 오늘 방문자: {todayVisitors}명
                            </span>
                        </div>
                        <h1 className="text-2xl md:text-3xl font-black text-slate-900 leading-tight">
                            보건의료 공기업 <span className="text-blue-600">채용 통합 포털</span>
                        </h1>
                    </header>

                    {mainView === 'jobs' ? (
                        <main className="space-y-6">
                            {/* 검색 바 */}
                            <div className="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm relative">
                                <Icon name="search" className="absolute left-7 top-1/2 -translate-y-1/2 text-slate-300 w-4 h-4" />
                                <input type="text" placeholder="기관명 또는 공고 제목으로 검색..." onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 pr-4 py-1.5 bg-transparent text-sm focus:outline-none font-medium border-none" />
                            </div>

                            {/* 🔥 기관 필터 (한국어 줄임말 적용) */}
                            <div className="flex gap-2 overflow-x-auto no-scrollbar pb-1">
                                <button onClick={() => setActiveTab('all')} className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${activeTab === 'all' ? 'bg-slate-900 text-white border-slate-900' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}>전체보기</button>
                                {institutions.map(inst => (
                                    <button 
                                        key={inst.id} 
                                        onClick={() => setActiveTab(inst.id)} 
                                        className={`flex-shrink-0 px-4 py-2 rounded-xl text-xs font-bold border transition-all ${activeTab === inst.id ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-50'}`}
                                    >
                                        {inst.shortName}
                                    </button>
                                ))}
                            </div>

                            {/* 공고 리스트 */}
                            <div className="space-y-3">
                                {loading ? <div className="py-20 text-center text-slate-300 animate-pulse font-bold text-sm">최신 채용 정보를 동기화 중입니다...</div> :
                                    filteredJobs.length > 0 ? (
                                        filteredJobs.map(job => {
                                            const instInfo = institutions.find(i => i.id === job.instId) || { shortName: job.instId.toUpperCase() };
                                            return (
                                                <div key={job.id} className="job-card bg-white p-5 md:p-6 rounded-2xl border border-slate-200 flex flex-col md:flex-row justify-between items-start md:items-center gap-4 text-left">
                                                    <div className="flex-1">
                                                        <div className="flex gap-1.5 mb-2 flex-wrap">
                                                            {/* 🔥 공고 카드 내 기관명도 한국어 줄임말로 표시 */}
                                                            <span className="text-[10px] font-black px-2 py-0.5 bg-slate-100 rounded text-slate-500 uppercase">{instInfo.shortName}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded border ${job.status === '마감' ? 'text-red-600 bg-red-50 border-red-100' : 'text-blue-600 bg-blue-50 border-blue-100'}`}>{job.status === '마감' ? '서류접수마감' : '채용진행중'}</span>
                                                            <span className="text-[10px] font-bold px-2 py-0.5 rounded border text-purple-600 bg-purple-50 border-purple-100">{job.jobType || "정규직"}</span>
                                                        </div>
                                                        <h3 className="text-[16px] md:text-[17px] font-bold text-slate-800 mb-2 leading-snug break-keep">{job.title}</h3>
                                                        <p className="text-[11px] font-bold text-slate-400 flex items-center gap-1"><Icon name="calendar" className="w-3 h-3" /> 접수기간: {job.startDate} ~ <span className={job.status === '마감' ? 'text-slate-300' : 'text-red-400'}>{job.endDate}</span></p>
                                                    </div>
                                                    <button onClick={() => window.open(job.link, '_blank')} className={`w-full md:w-auto px-7 py-2.5 rounded-xl font-bold text-xs shadow-sm transition-all ${job.status === '마감' ? 'bg-slate-100 text-slate-400 cursor-not-allowed' : 'bg-slate-900 text-white hover:bg-blue-600'}`}>{job.status === '마감' ? '모집종료' : '지원하기'}</button>
                                                </div>
                                            );
                                        })
                                    ) : (
                                        <div className="py-20 text-center bg-white rounded-3xl border border-dashed border-slate-200"><p className="text-slate-400 text-sm font-bold">현재 필터에 해당하는 진행 중인 공고가 없습니다.</p></div>
                                    )
                                }
                            </div>
                        </main>
                    ) : (
                        /* 기관별 합격 가이드 줄글 페이지 */
                        <div className="bg-white p-8 rounded-3xl border border-slate-200 shadow-sm space-y-12 text-left">
                            <h2 className="text-2xl font-black text-slate-900 border-b pb-4">주요 보건의료 기관별 합격 전략 및 근무 환경 분석</h2>
                            {institutions.map(inst => (
                                <article key={inst.id} className="space-y-4">
                                    <h3 className="text-xl font-bold text-blue-700 flex items-center gap-2"><Icon name="building" /> {inst.name} ({inst.shortName})</h3>
                                    <div className="text-sm text-slate-700 space-y-3 font-medium leading-relaxed">
                                        <p><strong>📅 채용 일정:</strong> {inst.specs.recruitSchedule}</p>
                                        <p><strong>💰 급여 수준:</strong> {inst.specs.salary}</p>
                                        <p><strong>🎯 요구 스펙:</strong> 어학은 {inst.specs.language} 이상이 안정권이며, 자격증은 {inst.specs.cert} 위주로 가점을 확보해야 합니다.</p>
                                        <p className="bg-blue-50 p-5 rounded-2xl text-blue-900 text-[13px] border border-blue-100"><strong>💡 합격 핵심 전략:</strong> {inst.specs.summary}</p>
                                    </div>
                                </article>
                            ))}
                        </div>
                    )}

                    {/* 추천 가이드 카드 (SEO) */}
                    <section className="mt-20 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                        <a href="guide.html" className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-500 transition-all shadow-sm">
                            <Icon name="map-pin" className="text-blue-500 mb-3" />
                            <h4 className="font-bold text-slate-900 text-sm mb-1">기관별 근무환경</h4>
                            <p className="text-[11px] text-slate-500">본사 위치부터 워라밸까지 한눈에 비교</p>
                        </a>
                        <a href="career.html" className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-500 transition-all shadow-sm">
                            <Icon name="award" className="text-orange-500 mb-3" />
                            <h4 className="font-bold text-slate-900 text-sm mb-1">임상 경력 활용법</h4>
                            <p className="text-[11px] text-slate-500">병원 경력이 합격에 미치는 영향 분석</p>
                        </a>
                        <a href="license.html" className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-500 transition-all shadow-sm">
                            <Icon name="check-circle" className="text-emerald-500 mb-3" />
                            <h4 className="font-bold text-slate-900 text-sm mb-1">가점 자격증 정리</h4>
                            <p className="text-[11px] text-slate-500">서류 합격권을 위한 필수 자격증 조합</p>
                        </a>
                        <a href="interview.html" className="bg-white p-6 rounded-2xl border border-slate-200 hover:border-blue-500 transition-all shadow-sm">
                            <Icon name="users" className="text-purple-500 mb-3" />
                            <h4 className="font-bold text-slate-900 text-sm mb-1">면접 주의사항</h4>
                            <p className="text-[11px] text-slate-500">실격 방지를 위한 블라인드 면접 가이드</p>
                        </a>
                    </section>

                    {/* FAQ 섹션 */}
                    <section className="mt-12 bg-white p-8 rounded-3xl border border-slate-200 shadow-sm">
                        <h2 className="text-xl font-black text-slate-900 mb-6 flex items-center gap-2"><Icon name="help-circle" className="text-blue-600" /> 보건의료 취업 FAQ</h2>
                        <div className="space-y-6 text-sm text-slate-700 font-medium">
                            <div>
